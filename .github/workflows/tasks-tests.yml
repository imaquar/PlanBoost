name: Tasks Tests

on:
  push:
  pull_request:

jobs:
  test-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django==6.0.3 Pillow

      - name: Run tasks tests
        run: python manage.py test tasks.tests
