{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PlanBoost{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="page">
    {% block header %}
        <header class="site-header">
            <div class="container">
                <nav class="site-nav">
                    <a href="/">Dashboard</a>
                    <a href="/tasks/">Tasks</a>
                    <a href="/notes/">Notes</a>
                    <a href="/timer/">Timer</a>
                    {% if user.is_authenticated %}
                        <a href="{% url 'users:profile' %}">Profile</a>
                    {% endif %}
                </nav>
            </div>
        </header>
    {% endblock header %}
    <main class="page-main">
        <div class="container">
            <h1 class="page-title">{% block title_h1 %}PlanBoost{% endblock title_h1 %}</h1>
            <div class="page-content">
                {% block content %}{% endblock content %}
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            PlanBoost © 2026
        </div>
    </footer>
</body>
</html>
