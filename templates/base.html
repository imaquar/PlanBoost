{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PlanBoost{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% block header %}
        <header>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/tasks/">Tasks</a>
                <a href="/notes/">Notes</a>
                <a href="/timer/">Timer</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'users:profile' %}">Profile</a>
                {% endif %}
            </nav>
        </header>
    {% endblock header %}
    <h1>{% block title_h1 %}PlanBoost{% endblock title_h1 %}</h1>
    <div>
        {% block content %}{% endblock content %}
    </div>

    <footer>
        PlanBoost © 2026
    </footer>
</body>
</html>
