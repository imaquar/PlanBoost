{% extends 'base.html' %}
{% block title %}Notes{% endblock title %}
{% block title_h1 %}Notes{% endblock title_h1 %}
{% block content %}
    {% if note %}
        {% for i in note %}
            <h2><a href="note/{{ i.id }}/">{{ i.label }}</a></h2>
        {% endfor %}
    {% endif %}
    <a href="{% url 'notes:create' %}">Create Note</a>
{% endblock content %}
