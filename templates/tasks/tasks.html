{% extends 'base.html' %}
{% block title %}Tasks{% endblock title %}
{% block title_h1 %}Tasks{% endblock title_h1 %}
{% block content %}
    {% if task %}
        {% for i in task %}
            <h2><a href="task/{{ i.id }}/">{{ i.label }}</a></h2>
        {% endfor %}
    {% endif %}
    <form method="get" action="{% url 'tasks:create' %}" style="display:inline;">
        <button type="submit">Create Task</button>
    </form>
{% endblock content %}
