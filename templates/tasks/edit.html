{% extends 'base.html' %}
{% block title %}Tasks{% endblock title %}
{% block title_h1 %}{% endblock title_h1 %}
{% block content %}
    <form method="POST" style="display:inline;">
        {% csrf_token %}
        {{ form }}<br>
        <button type="submit">Update</button>
    </form>
    <form method="get" action="{% url 'tasks:task' task.id %}" style="display:inline;">
        <button type="submit">Cancel</button>
    </form>
{% endblock content %}
